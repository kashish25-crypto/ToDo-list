<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List</title>
  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body{
      background-image: url("https://plus.unsplash.com/premium_photo-1683309563562-aa3cfde9ed10?fm=jpg&q=60&w=3000&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MXx8dG9kbyUyMGxpc3R8ZW58MHx8MHx8fDA%3D");
      background-size: cover;

      background-repeat: no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
   
    .mam{
      margin: 150px 100px ;
      width: 100%;
      background-color: azure;
    }
    #inputbox{
      width: 80%;
      margin: 20px 30px;
      height: 50px;
      padding: 15px;
      border: 2px solid gray;
      font-size: 16px;
    }
    #addbtn{
      width: 80px;
      margin: 20px;
      height: 50px;
      cursor: pointer;
    }
    h1{
      padding: 20px;
      text-align: center;
      font-family: 'Courier New', Courier, monospace;

    }
    #addlist{
      list-style: none;
      margin: 20px 30px;
    
      
    }
   #addlist li{
    background-color:lightpink;
    padding: 20px;
    margin-bottom: 10px;
    border-radius: 10px;
    height: 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;

    font-size: 17px;
    font-family: Arial, Helvetica, sans-serif;

   }
   #addlist span {
  flex: 1;
}

#addlist button {
  margin-left: 10px;
  padding: 8px 12px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

#addlist button {
  background-color: red;
  color: white;
}

#addlist button:last-of-type {
  background-color: blue;
  color: white;
}
#addlist input {
  flex: 1;
  padding: 8px;
  font-size: 16px;
}
input{
  padding: 20px;
  letter-spacing: 2px;
}
@media (max-width: 600px){

  h1{
    font-size: 28px;
  }

  #addlist li{
    flex-direction: column;
    align-items: stretch;
  }

  #addlist button{
    width: 100%;
  }
}
  </style>
</head>

<body>
  <div class="mam">
  <h1>todo list</h1>
  <input type="text" id="inputbox" placeholder="Your task">
  <button id="addbtn">add</button>
  <ul id="addlist"></ul>
  </div>
  <script>
    let input = document.getElementById("inputbox");
    let button = document.getElementById("addbtn");
    let list = document.getElementById("addlist");

    button.addEventListener("click", function () {
            if (input.value == "") return;
      let li = document.createElement("li");

      let span = document.createElement("span");
      span.textContent = input.value;
    
     li.appendChild(span);
     list.appendChild(li);
    

      let del = document.createElement("button");
      del.textContent = "delete";
      li.appendChild(del);

      del.addEventListener('click', function () {
        li.remove();
      });

      let edit = document.createElement("button");
      edit.textContent = "edit";
      li.appendChild(edit);


      let isEditing  = false;
      let editInput;

      edit.addEventListener("click", function() {

        if(!isEditing){
        editInput = document.createElement("input");
       editInput.type = "text";
       editInput.value = span.textContent;

       li.replaceChild(editInput, span);

       edit.textContent = "save";
       isEditing = true;

        }else{
          span.textContent = editInput.value;
          li.replaceChild(span, editInput);

          edit.textContent = "edit";
          isEditing = false;
        }

       
       
      });

      input.value = "";
    });


  </script>
</body>

</html>
